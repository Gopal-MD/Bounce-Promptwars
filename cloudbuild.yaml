steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bounce-connection:latest', '.']
    id: 'build-image'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bounce-connection:latest']
    id: 'push-image'
    waitFor: ['build-image']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - 'deploy'
      - 'bounce-connection'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/bounce-connection:latest'
      - '--location=asia-south1'
      - '--region=asia-south1'
      - '--port=8080'

  # Run tests
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']
    id: 'install-deps'

  - name: 'gcr.io/cloud-builders/npm'
    args: ['test']
    id: 'run-tests'
    waitFor: ['install-deps']

images:
  - 'gcr.io/$PROJECT_ID/bounce-connection:latest'

timeout: '1800s'
options:
  machineType: 'N1_HIGHCPU_8'
